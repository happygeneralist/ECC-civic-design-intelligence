name: Build GitHub Pages stats

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build repository stats
        run: node scripts/build-stats.mjs

      - name: Commit generated stats if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update generated repository stats
          file_pattern: docs/stats.json
